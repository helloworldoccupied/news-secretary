name: One-time DB setup
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Create daily_intelligence table
        env:
          MGMT_KEY: ${{ secrets.SUPABASE_MGMT_KEY }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/dmdicqhkjefxethauypp/database/query" \
            -H "Authorization: Bearer $MGMT_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query": "CREATE TABLE IF NOT EXISTS daily_intelligence (id BIGSERIAL PRIMARY KEY, date DATE NOT NULL, report TEXT NOT NULL, news_count INTEGER, created_at TIMESTAMPTZ DEFAULT NOW());"}'
          echo "Table created successfully"
