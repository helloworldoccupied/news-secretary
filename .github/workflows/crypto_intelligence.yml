name: 加密投研日报 (Line 1)

on:
  schedule:
    # 每日 08:00 北京时间 (UTC+8) → UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  crypto_intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Crypto Daily Intelligence
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crypto_daily_intelligence.py

      - name: Deploy Preview to GitHub Pages
        if: always()
        run: |
          if [ ! -f preview.html ]; then
            echo "No preview.html generated, skipping"
            exit 0
          fi
          echo "Deploying preview.html to gh-pages..."
          # 保存preview到临时位置
          cp preview.html /tmp/preview.html
          # 配置git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 切换到gh-pages分支
          git fetch origin gh-pages
          git checkout gh-pages
          # 复制preview为index.html
          cp /tmp/preview.html index.html
          git add index.html
          # 只在有变化时提交
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "update crypto preview $(date -u +%Y-%m-%d)"
            git push origin gh-pages
            echo "Preview deployed: https://helloworldoccupied.github.io/news-secretary/"
          fi
